<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ajude o Felipe a Não Dormir no Chão</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      text-align: center;
      padding: 40px 20px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    h1 {
      color: white;
      font-size: 2.5em;
      margin-bottom: 40px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
      letter-spacing: 1px;
    }

    .card {
      background: white;
      padding: 40px 30px;
      border-radius: 20px;
      max-width: 550px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .card p {
      font-size: 1.1em;
      color: #333;
      line-height: 1.8;
      margin-bottom: 15px;
    }

    .card h3 {
      color: #667eea;
      margin: 25px 0 20px 0;
      font-size: 1.5em;
    }

    .progress {
      background: #f0f0f0;
      border-radius: 15px;
      overflow: hidden;
      margin: 25px 0;
      height: 40px;
    }

    .progress-bar {
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      width: 32%;
      height: 100%;
      padding: 10px;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 0.95em;
      transition: width 0.6s ease;
    }

    button {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      padding: 15px 40px;
      font-size: 1.1em;
      font-weight: 600;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:hover {
      transform: translateY(-2px);
    }

    #msg {
      margin-top: 20px;
      font-size: 1.1em;
      font-weight: 600;
      color: #764ba2;
      min-height: 30px;
    }

    /* 📱 MOBILE */
    @media (max-width: 600px) {
      body {
        padding: 20px 10px;
        align-items: flex-start;
      }

      h1 {
        font-size: 1.5em;
        margin-bottom: 20px;
      }

      .card {
        padding: 25px 20px;
        border-radius: 15px;
      }

      .card p {
        font-size: 1em;
        line-height: 1.6;
      }

      .card h3 {
        font-size: 1.2em;
      }

      .progress {
        height: 30px;
      }

      .progress-bar {
        font-size: 0.8em;
        padding: 5px;
      }

      button {
        width: 100%;
        padding: 14px;
        font-size: 1em;
      }

      #msg {
        font-size: 1em;
      }
    }
  </style>
</head>
